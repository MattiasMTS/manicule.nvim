name: lint-test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  stylua:
    name: stylua
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          version: latest
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --color always --check lua tests

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        nvim-version: [stable, nightly]
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }}, ${{ matrix.nvim-version }})
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - uses: rhysd/action-setup-vim@v1.6.1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}

      - name: run tests
        run: scripts/test
